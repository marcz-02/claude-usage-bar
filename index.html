<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Claude Session Ring — Menu Bar Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1c1c1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    gap: 40px;
  }

  /* ── Simulated macOS menu bar ── */
  .menubar {
    width: 100%;
    height: 24px;
    background: #2a2a2c;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 12px;
    gap: 16px;
    position: fixed;
    top: 0;
    box-shadow: 0 1px 0 rgba(255,255,255,0.07);
  }
  .menubar-icon {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.55;
    font-size: 11px;
    color: #fff;
  }
  .menubar-icon.active { opacity: 1; }

  /* ── Large preview ── */
  .preview-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 40px;
  }
  .label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pct-text {
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.02em;
    min-width: 70px;
    text-align: center;
  }

  /* ── Icon-size preview strip ── */
  .strip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2a2a2c;
    padding: 8px 16px;
    border-radius: 10px;
  }
  .strip-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-right: 4px;
  }
</style>
</head>
<body>

<!-- Simulated menu bar -->
<div class="menubar">
  <div class="menubar-icon">⌚ Mi 15. Mai</div>
  <div class="menubar-icon">100%</div>
  <div class="menubar-icon active">
    <canvas id="bar-icon" width="16" height="16"></canvas>
  </div>
  <div class="menubar-icon">☁ ◉ ▲</div>
</div>

<!-- Large animated preview -->
<div class="preview-wrap">
  <div class="label">Menu Bar Icon — Vorschau</div>
  <canvas id="main-ring" width="220" height="220"></canvas>
  <div class="pct-text" id="pct-label">0%</div>
</div>

<!-- Real icon-size strip (22 px = actual menu bar size) -->
<div class="strip">
  <span class="strip-label">Echte Größe (22 px):</span>
  <canvas id="icon-22" width="22" height="22"></canvas>
</div>

<script>
// ── Brushstroke ring ──────────────────────────────────────────────────────────

function drawRing(ctx, pct, cx, cy, radius, maxStroke, fg, bgColor) {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

  // Thin background ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = bgColor;
  ctx.lineWidth = Math.max(0.5, maxStroke * 0.08);
  ctx.lineCap = "butt";
  ctx.stroke();

  if (pct <= 0) return;

  const startAngle = -Math.PI / 2;
  const totalAngle = (pct / 100) * Math.PI * 2;
  const N = Math.max(150, Math.ceil(totalAngle * radius * 1.5));

  for (let i = 0; i < N; i++) {
    const t0 = i / N;
    const a0 = startAngle + t0 * totalAngle;
    const a1 = startAngle + ((i + 1) / N) * totalAngle;
    const w  = maxStroke * Math.pow(t0, 0.72);

    ctx.beginPath();
    ctx.arc(cx, cy, radius, a0, a1);
    ctx.strokeStyle = fg;
    ctx.lineWidth   = Math.max(0.2, w);
    ctx.lineCap     = "round";
    ctx.stroke();
  }
}

// ── Main large canvas ─────────────────────────────────────────────────────────

const mainCanvas = document.getElementById("main-ring");
const mainCtx    = mainCanvas.getContext("2d");
const W = mainCanvas.width, CX = W / 2, CY = W / 2;
const RADIUS = 82, STROKE = 16;

// Real icon-size canvas (22 px)
const icon22    = document.getElementById("icon-22");
const ctx22     = icon22.getContext("2d");

// Tiny menu bar canvas (16 px)
const barIcon   = document.getElementById("bar-icon");
const ctxBar    = barIcon.getContext("2d");

const pctLabel  = document.getElementById("pct-label");

let pct = 0, dir = 1;

function animate() {
  // Large preview
  drawRing(mainCtx, pct, CX, CY, RADIUS, STROKE,
           "rgba(255,255,255,0.92)", "rgba(255,255,255,0.12)");

  // Actual 22 px icon
  drawRing(ctx22, pct, 11, 11, 7.5, 3.2,
           "rgba(255,255,255,0.92)", "rgba(255,255,255,0.12)");

  // Tiny menu bar icon (16 px)
  drawRing(ctxBar, pct, 8, 8, 5.5, 2.4,
           "rgba(255,255,255,0.92)", "rgba(255,255,255,0.12)");

  pctLabel.textContent = Math.round(pct) + "%";

  pct += dir * 0.4;
  if (pct >= 100) { pct = 100; dir = -1; }
  if (pct <= 0)   { pct = 0;   dir =  1; }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
